version: 2
updates:
  # Keep the GitHub Actions used in our workflows patched.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
    labels:
      - "dependencies"
      - "github-actions"

  # Keep the dev-only Composer tooling (PHPCS, WPCS, compatibility) current.
  # These are not shipped in the plugin zip; they only run in CI and locally.
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
      - "composer"
